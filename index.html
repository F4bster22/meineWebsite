<!DOCTYPE html>
<html>
    <head>
        <title>Rüdiger Mit ie</title>
        <!-- Meta-Daten = unsichtbare Daten -->
		<!-- Bestimmt wie der Text (z.B. Umlaute) kodiert ist -->
        <meta charset="utf-8" />
		<!-- Ein essenzieller Tag für Responsive Webdesign. Sorgt dafür, dass die Website auf Mobilgeräten (Smartphones, Tablets) korrekt skaliert und in der richtigen Breite angezeigt wird. -->
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<!-- Dieser HTML-Code bindet eine externe CSS-Datei in eine Webseite ein, um das visuelle Design (wie Farben, Schriftarten und Layout) festzulegen. -->
		<!-- <link ... />: Das HTML-Element verknüpft das aktuelle Dokument mit einer externen Ressource.
			Das Attribut rel (Relation) definiert die Beziehung zur Datei.
			Der Wert "stylesheet" sagt dem Browser, dass es sich um eine Formatvorlage (CSS) handelt.
			Das Attribut href (Hypertext Reference) gibt den genauen Dateipfad an. -->
		<!-- <link rel="stylesheet" href="assets/css/main.css" /> -->
		<!-- <noscript> ein Tag, das Ersatzinhalte für Webseitenbesucher anzeigt. Es kommt zum Einsatz, wenn der Webbrowser des Nutzers Skripte (meist JavaScript) nicht unterstützt -->
		<noscript>Please activate JavaScript</noscript>
    </head>
		
    <body>
            <!-- Page Wrapper -->
				<!-- Ein sogenanntes "Division"-Element. Es ist ein neutraler Behälter ohne eigene visuelle Bedeutung, der in der Webentwicklung genutzt wird, um mehrere andere HTML-Elemente zusammenzufassen. -->
				<!-- Das id-Attribut dient als eindeutige Kennung für dieses spezifische Element. Der Name page-wrapper ist frei gewählt -->
			    <div id="page-wrapper"> 
                
                    <!-- Header -->
               	        <header id="header" class="alt">
				            <h1><a href="index.html">Rüdiger Mit ie</a></h1>
							<nav id="nav">
								
							</nav>
                            <p>Under construction...</p>
                            <p>Why don't you come back later?</p>
                        </header>
				</div>
    </body>
</html>
